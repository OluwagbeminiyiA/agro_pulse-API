        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBuyerProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBuyerProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBuyerProfile'
      security:
      - cookieAuth: []
      - tokenAuth: []
      - jwtAuth: []
