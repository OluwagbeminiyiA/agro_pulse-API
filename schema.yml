          - IN_TRANSIT
          - PENDING
          - PICKED_UP
        description: |-
          * `PENDING` - Pending
          * `PICKED_UP` - Picked Up
          * `IN_TRANSIT` - In Transit
          * `DELIVERED` - Delivered
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: transporter
        schema:
          type: string
          format: uuid
      tags:
      - deliveries
      security:
      - cookieAuth: []
      - tokenAuth: []
      - jwtAuth: []
      responses:
