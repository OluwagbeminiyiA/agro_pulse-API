components:
  schemas:
    AvailabilityStatusEnum:
      enum:
      - AVAILABLE
      - LOW_STOCK
      - SOLD_OUT
      type: string
      description: |-
        * `AVAILABLE` - Available
        * `LOW_STOCK` - Low Stock
        * `SOLD_OUT` - Sold Out
    BlankEnum:
      enum:
      - ''
    BuyerProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
        user_email:
          type: string
          readOnly: true
        user_full_name:
          type: string
          readOnly: true
        business_name:
          type: string
          nullable: true
          maxLength: 255
        buyer_type:
          $ref: '#/components/schemas/BuyerTypeEnum'
        location:
          type: string
          maxLength: 255
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - buyer_type
      - created_at
      - id
      - location
      - updated_at
      - user
      - user_email
      - user_full_name
    BuyerTypeEnum:
      enum:
      - INDIVIDUAL
      - RESTAURANT
      - WHOLESALER
      type: string
      description: |-
        * `INDIVIDUAL` - Individual
        * `RESTAURANT` - Restaurant
        * `WHOLESALER` - Wholesaler
    CategoryEnum:
      enum:
      - VEGETABLES
      - FRUITS
      - GRAINS
      - DAIRY
      - MEAT
      - OTHER
      type: string
      description: |-
        * `VEGETABLES` - Vegetables
        * `FRUITS` - Fruits
        * `GRAINS` - Grains
        * `DAIRY` - Dairy
        * `MEAT` - Meat
        * `OTHER` - Other
    ChannelEnum:
      enum:
      - USSD
      - CARD
      - TRANSFER
      - VIRTUAL-ACCOUNT
      type: string
      description: |-
        * `USSD` - ussd
        * `CARD` - card
        * `TRANSFER` - Transfer
        * `VIRTUAL-ACCOUNT` - virtual-account
    CurrencyEnum:
      enum:
      - USD
      - NGN
      type: string
      description: |-
        * `USD` - usd
        * `NGN` - ngn
    Delivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        order:
          type: string
          format: uuid
        transporter:
          type: string
          format: uuid
          nullable: true
        transporter_name:
          type: string
          readOnly: true
        transporter_vehicle:
          type: string
          readOnly: true
        delivery_status:
          $ref: '#/components/schemas/DeliveryStatusEnum'
        delivery_address:
          type: string
        buyer_name:
          type: string
          readOnly: true
        farmer_name:
          type: string
          readOnly: true
        order_total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        picked_up_at:
          type: string
          format: date-time
          nullable: true
        delivered_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - buyer_name
      - created_at
      - delivered_at
      - delivery_address
      - farmer_name
      - id
      - order
      - order_total
      - transporter_name
      - transporter_vehicle
      - updated_at
    DeliveryDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        order:
          type: string
          format: uuid
        order_details:
          type: string
          readOnly: true
        transporter:
          type: string
          format: uuid
          nullable: true
        transporter_details:
          type: string
          readOnly: true
        delivery_status:
          $ref: '#/components/schemas/DeliveryStatusEnum'
        delivery_address:
          type: string
        picked_up_at:
          type: string
          format: date-time
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - delivery_address
      - id
      - order
      - order_details
      - transporter_details
      - updated_at
    DeliveryStatusEnum:
      enum:
      - PENDING
      - PICKED_UP
      - IN_TRANSIT
      - DELIVERED
      type: string
      description: |-
        * `PENDING` - Pending
        * `PICKED_UP` - Picked Up
        * `IN_TRANSIT` - In Transit
        * `DELIVERED` - Delivered
    DeliveryTypeEnum:
      enum:
      - PICKUP
      - DELIVERY
      type: string
      description: |-
        * `PICKUP` - Pickup
        * `DELIVERY` - Delivery
    EscrowAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        payment:
          type: string
          format: uuid
        payment_id:
          type: string
          readOnly: true
        farmer:
          type: string
          format: uuid
        farmer_name:
          type: string
          readOnly: true
        amount_held:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        release_status:
          $ref: '#/components/schemas/ReleaseStatusEnum'
        released_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - amount_held
      - created_at
      - farmer
      - farmer_name
      - id
      - payment
      - payment_id
      - updated_at
    FarmerProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
        user_email:
          type: string
          readOnly: true
        user_full_name:
          type: string
          readOnly: true
        farm_name:
          type: string
          maxLength: 255
        farm_location:
          type: string
          maxLength: 255
        trust_score:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,2})?$
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - farm_location
      - farm_name
      - id
      - updated_at
      - user
      - user_email
      - user_full_name
    FrequencyEnum:
      enum:
      - DAILY
      - WEEKLY
      - MONTHLY
