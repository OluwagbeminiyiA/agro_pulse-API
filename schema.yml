    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        buyer:
          type: string
          format: uuid
        buyer_business_name:
          type: string
          readOnly: true
        buyer_email:
          type: string
          readOnly: true
        farmer:
          type: string
          format: uuid
        farmer_farm_name:
          type: string
          readOnly: true
        farmer_user_email:
          type: string
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        order_status:
          $ref: '#/components/schemas/OrderStatus411Enum'
        delivery_type:
          $ref: '#/components/schemas/DeliveryTypeEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - buyer
      - buyer_business_name
      - buyer_email
      - created_at
      - delivery_type
      - farmer
      - farmer_farm_name
      - farmer_user_email
      - id
      - total
      - updated_at
    OrderDetailWithItems:
      type: object
