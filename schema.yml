openapi: 3.0.3
info:
  title: AgroPulse API
  version: 1.0.0
  description: Agropulse is an AI-powered agricultural commerce platform for farmers,
    buyers, riders, and operations teams. The project is built with Django and Django
    REST Framework and currently covers user management, produce management, orders,
    delivery, payments, and recurring subscriptions.
paths:
  /api/buyers/:
    get:
      operationId: buyers_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - buyers
      security:
      - cookieAuth: []
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BuyerProfile'
          description: ''
    post:
      operationId: buyers_create
      tags:
      - buyers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuyerProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BuyerProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BuyerProfile'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerProfile'
          description: ''
  /api/buyers/{id}/:
    get:
      operationId: buyers_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this buyer profile.
        required: true
      tags:
      - buyers
      security:
      - cookieAuth: []
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuyerProfile'
          description: ''
    put:
