          format: uuid
          readOnly: true
        buyer:
          type: string
          format: uuid
        buyer_details:
          type: string
          readOnly: true
        farmer:
          type: string
          format: uuid
        farmer_details:
          type: string
          readOnly: true
        items:
          type: array
